   <path d="M118 60l-3-3" stroke="#e85d3a" stroke-width="1.5" opacity="0.6"/>
   <path d="M142 60l3-3" stroke="#e85d3a" stroke-width="1.5" opacity="0.6"/>
   <!-- 左手 - 自然垂下 -->
   <path d="M68 92q-12-2-16 8l-4 8" stroke="#1a1a1a" stroke-width="2"/>
