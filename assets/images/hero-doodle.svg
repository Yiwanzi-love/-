   <line x1="82" y1="133" x2="100" y2="133" stroke="#e85d3a" stroke-width="1.2" opacity="0.5"/>
   <line x1="82" y1="138" x2="96" y2="138" stroke="#e85d3a" stroke-width="1.2" opacity="0.5"/>
   <line x1="82" y1="143" x2="88" y2="143" stroke="#e85d3a" stroke-width="1.2" opacity="0.5"/>
   <!-- 右侧装饰点 -->
   <circle cx="156" cy="50" r="3" stroke="#e85d3a" stroke-width="1.5" fill="#e85d3a" opacity="0.3"/>
   <circle cx="162" cy="80" r="2.5" stroke="#e85d3a" stroke-width="1.5" fill="#e85d3a" opacity="0.2"/>
   <circle cx="148" cy="100" r="2" stroke="#e85d3a" stroke-width="1.5" fill="#e85d3a" opacity="0.25"/>
 </svg>
 
